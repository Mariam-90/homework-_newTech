name: Lab 3 - Parallel jobs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-validator:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3
    

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run validator tests
        run: pytest test_validator.py -v

  test-transformer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run transformer tests
        run: pytest test_transformer.py -v

  test-reporter:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reporter tests
        run: pytest test_reporter.py -v

  pipeline-summary:
    runs-on: ubuntu-latest

    needs:
      - test-validator
      - test-transformer
      - test-reporter

    if: always()

    steps:
      - name: Print job results
        run: |
          echo "validator: ${{ needs.test-validator.result }}"
          echo "transformer: ${{ needs.test-transformer.result }}"
          echo "reporter: ${{ needs.test-reporter.result }}"