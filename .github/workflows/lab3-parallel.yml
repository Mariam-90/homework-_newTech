name: Lab 3 - Parallel jobs

on:
  push:
    paths:
      - 'lab3'
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-validator:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run validator tests with coverage
        run: pytest test_validator.py -v --cov=validator --cov-report=term-missing --cov-report=xml:coverage-validator.xml

      - name: Upload validator coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-validator-${{ matrix.os }}
          path: lab3/coverage-validator.xml

  test-transformer:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run transformer tests with coverage
        run: pytest test_transformer.py -v --cov=transformer --cov-report=term-missing --cov-report=xml:coverage-transformer.xml

      - name: Upload transformer coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-transformer-${{ matrix.os }}
          path: lab3/coverage-transformer.xml

  test-reporter:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run reporter tests with coverage
        run: pytest test_reporter.py -v --cov=reporter --cov-report=term-missing --cov-report=xml:coverage-reporter.xml

      - name: Upload reporter coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reporter-${{ matrix.os }}
          path: lab3/coverage-reporter.xml

  security-scan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./lab3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Run security scan
        run: bandit -r .

  pipeline-summary:
    runs-on: ubuntu-latest

    needs:
      - test-validator
      - test-transformer
      - test-reporter
      - security-scan

    if: always()

    steps:
      - name: Print job results
        run: |
          echo "validator: ${{ needs.test-validator.result }}"
          echo "transformer: ${{ needs.test-transformer.result }}"
          echo "reporter: ${{ needs.test-reporter.result }}"
          echo "security scan: ${{ needs.security-scan.result }}"